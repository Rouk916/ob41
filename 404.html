<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />

  <meta name="theme-color" content="#f7b500" />
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(ellipse at 50% 40%, rgba(247,181,0,0.15) 0%, transparent 60%), #0a0a0a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(6rem, 22vw, 14rem);
      line-height: 0.9;
      color: #f7b500;
      text-shadow: 0 0 40px rgba(247,181,0,0.4);
    }
    p { color: #888; letter-spacing: 2px; text-transform: uppercase; font-size: 0.9rem; margin-bottom: 2rem; }
    a {
      display: inline-block;
      background: linear-gradient(135deg, #f7b500, #ffd633);
      color: #fff;
      padding: 1rem 2.5rem;
      border-radius: 4px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.85rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    a:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(247,181,0,0.4); }
  </style>
</head>
